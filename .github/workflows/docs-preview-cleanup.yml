name: Remove PR Preview

on:
  pull_request:
    types: [closed]

permissions:
  actions: read
  contents: write
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: pr-cleanup-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  cleanup-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Clone docs repository
        run: |
          git clone ${{ vars.SPY_DOCS_REPOSITORY }} /tmp/spy-docs

      - name: Configure Git in docs repository
        working-directory: /tmp/spy-docs
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

      - name: Remove PR Preview folder using GitHub Pages Deploy Action
        working-directory: /tmp/spy-docs
        run: |
          ls ./pr-preview
          ls ./pr-preview/pr-${{ github.event.pull_request.number }}
          rm -rf ./pr-preview/pr-${{ github.event.pull_request.number }}
          git commit -am "Removed preview files from closed PR ${{ github.event.pull_request.number }}"
          git push
          ls ./pr-preview

  check-comment:
    runs-on: ubuntu-latest
    outputs:
      comment-id: ${{ steps.has-sticky.outputs.comment-id }}
    steps:
      - name: Check if PR has Sticky Comment
        id: has-sticky
        uses: peter-evans/find-comment@v4.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }} # Works for pull request number as well
          body-includes: <!-- Sticky Pull Request Commentpr-preview -->

  cleanup-comment:
    runs-on: ubuntu-latest
    needs: check-comment
    if: needs.check-comment.outputs.comment-id != ''
    steps:
      - name: Get timestamp (UTC)
        id: ts
        run: echo "utc=$(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_OUTPUT"

      - name: Post removal sticky PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ github.event.pull_request.number }}
          header: pr-preview
          message: |
            Documentation Preview
            :---:
            Preview removed because the pull request was closed.
            Preview removed ${{ steps.ts.outputs.utc }}
            <!-- Sticky Pull Request Commentpr-preview -->