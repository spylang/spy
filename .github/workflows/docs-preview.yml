name: Preview Docs Builds

# When a new udpate is made to this PR, cancel any still-running builds from previous pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/docs**'
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:
    

jobs:
  build-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
           pip install .[docs]

      - name: Build and deploy mkdocs
        run: |
          mkdocs build --config-file docs/mkdocs.yml --site-dir ./site -v
          
      - name: Deploy PR Preview
        id: deploy-preview-site
        uses: rossjrw/pr-preview-action@v1.8.1
        with:
          source-dir: ./docs/site
          preview-branch: gh-pages
          qr-code: false

      - name: Add PR Comment
        uses: mshick/add-pr-comment@v3.11.0
        with:
          message: |
            Documentation preview published at ${{ steps.deploy-preview-site.outputs.preview-url }} :disguised_face:
