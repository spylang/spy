name: Preview Docs Builds

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - closed

jobs:
  build-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
           pip install .[docs]

      - name: Configure Git in docs repository
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

      - name: Build and deploy mkdocs
        run: |
          mkdocs build --config-file docs/mkdocs.yml --site-dir ./site -v
          ls
          cd ./docs/site
          ls
          
      - name: Deploy PR Preview
        id: deploy-preview-site
        uses: rossjrw/pr-preview-action@v1.8.1
        with:
          source-dir: ./docs/site
          preview-branch: gh-pages
          qr-code: false

      - name: Add PR Comment
        needs: deploy-preview-site
        uses: mshick/add-pr-comment@v3.11.0
        with:
          message: |
            Documentation preview published at ${{ steps.deploy-preview-site.outputs.preview-url }} :disguised_face:
