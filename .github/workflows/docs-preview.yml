name: Preview Docs Builds

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - closed

jobs:
  build-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone docs repository
        run: |
          git clone https://github.com/jeffersglass/spy.git /tmp/spy-docs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
           pip install .[docs]

      - name: Configure Git in docs repository
        working-directory: /tmp/spy-docs
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

      - name: Build and deploy mkdocs
        working-directory: /tmp/spy-docs
        run: |
          mike deploy --config-file $GITHUB_WORKSPACE/docs/mkdocs.yml --update-aliases preview
          mike set-default preview --config-file $GITHUB_WORKSPACE/docs/mkdocs.yml

      - name: Deploy PR Preview
        uses: rossjrw/pr-preview-action@v1.8.1
        with:
          source-dir: ./docs/site
          preview-branch: gh-pages