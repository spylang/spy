name: jsffi tests

on:
  pull_request:
    paths:
      - 'spy/libspy/**'
      - 'spy/vm/modules/jsffi.py'
      - 'spy/tests/compiler/test_jsffi.py'
      - 'examples/jsffi/**'
      - '.github/workflows/jsffi.yml'
  push:
    branches:
      - main
    paths:
      - 'spy/libspy/**'
      - 'spy/vm/modules/jsffi.py'
      - 'spy/tests/compiler/test_jsffi.py'
      - 'examples/jsffi/**'
      - '.github/workflows/jsffi.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-jsffi:
    name: jsffi tests + canvas build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/jsffi/canvas

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgc-dev

      - name: Set up Emscripten
        uses: mymindstorm/setup-emscripten@v14
        with:
          version: 5.0.6

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install canvas demo dependencies
        run: |
          uv sync

      - name: Build libspy
        run: uv run make -C ../../../spy/libspy

      - name: Install spy dev dependencies
        run: |
          uv pip install -e ../../..[dev]

      - name: Run jsffi tests
        run: uv run pytest ../../../spy/tests/compiler/test_jsffi.py -v

      - name: Build minimal example
        run: |
          uv run --directory ../minimal spy build --target emscripten demo.spy
          uv run --directory ../minimal spy build --target emscripten lldemo.spy
          uv run --directory ../minimal ./make_raw_c_demo.sh

      - name: Build canvas demo (particles)
        run: |
          uv run make html-spy-particles
          uv run make build-wasm-particles RELEASE=1
          mkdir -p build/output-spy-particles/build
          mv index.html build/output-spy-particles
          mv build/demo_particles.* build/output-spy-particles/build

      - name: Build canvas demo (image_data)
        run: |
          make html-spy-image_data
          make build-wasm-image_data RELEASE=1
          mkdir -p build/output-spy-image_data/build
          mv index.html build/output-spy-image_data
          mv build/demo_image_data.* build/output-spy-image_data/build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: canvas-demos
          path: |
            examples/jsffi/canvas/build/output-spy-particles
            examples/jsffi/canvas/build/output-spy-image_data
